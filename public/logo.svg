<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Card stack shadow -->
  <rect x="6" y="12" width="36" height="24" rx="4" fill="currentColor" opacity="0.15"/>
  <!-- Card back -->
  <rect x="4" y="10" width="36" height="24" rx="4" fill="currentColor" opacity="0.4"/>
  <!-- Card front -->
  <rect x="8" y="14" width="36" height="24" rx="4" fill="currentColor"/>
  <!-- Magnetic stripe -->
  <rect x="8" y="20" width="36" height="6" fill="currentColor" opacity="0.25"/>
  <!-- Barcode lines -->
  <rect x="13" y="29" width="2" height="5" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="17" y="29" width="1" height="5" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="20" y="29" width="3" height="5" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="25" y="29" width="1" height="5" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="28" y="29" width="2" height="5" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="32" y="29" width="1" height="5" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="35" y="29" width="2" height="5" rx="0.5" fill="white" opacity="0.9"/>
  <!-- Chip circle -->
  <circle cx="17" cy="18" r="3" fill="white" opacity="0.7"/>
</svg>
